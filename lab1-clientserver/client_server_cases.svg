<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 940"
     font-family="ui-sans-serif, system-ui, sans-serif" font-size="12">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ── CASE 1: Normal ── -->
  <rect x="40" y="18" width="600" height="28" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="32" text-anchor="middle" dominant-baseline="central" font-weight="500" font-size="13" fill="#085041">1 · Normal case</text>

  <rect x="55" y="58" width="110" height="36" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="110" y="76" text-anchor="middle" dominant-baseline="central" font-weight="500" font-size="13" fill="#0C447C">Client</text>
  <rect x="515" y="58" width="110" height="36" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="570" y="76" text-anchor="middle" dominant-baseline="central" font-weight="500" font-size="13" fill="#3C3489">Server</text>

  <line x1="110" y1="94" x2="110" y2="182" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="570" y1="94" x2="570" y2="182" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="4 3"/>

  <line x1="113" y1="118" x2="567" y2="118" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="340" y="112" text-anchor="middle" fill="#185FA5">Request(AMOCommand)</text>
  <line x1="567" y1="152" x2="113" y2="152" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="340" y="146" text-anchor="middle" fill="#0F6E56">Reply(AMOResult)</text>

  <!-- ── CASE 2: Retry ── -->
  <rect x="40" y="200" width="600" height="28" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="340" y="214" text-anchor="middle" dominant-baseline="central" font-weight="500" font-size="13" fill="#633806">2 · Retry case</text>

  <rect x="55" y="240" width="110" height="36" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="110" y="258" text-anchor="middle" dominant-baseline="central" font-weight="500" font-size="13" fill="#0C447C">Client</text>
  <rect x="515" y="240" width="110" height="36" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="570" y="258" text-anchor="middle" dominant-baseline="central" font-weight="500" font-size="13" fill="#3C3489">Server</text>

  <line x1="110" y1="276" x2="110" y2="390" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="570" y1="276" x2="570" y2="390" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="4 3"/>

  <line x1="113" y1="302" x2="355" y2="302" stroke="#185FA5" stroke-width="1.5"/>
  <text x="224" y="296" text-anchor="middle" fill="#185FA5">Request</text>
  <line x1="348" y1="295" x2="364" y2="311" stroke="#A32D2D" stroke-width="2" stroke-linecap="round"/>
  <line x1="364" y1="295" x2="348" y2="311" stroke="#A32D2D" stroke-width="2" stroke-linecap="round"/>
  <rect x="370" y="293" width="46" height="22" rx="4" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="393" y="304" text-anchor="middle" dominant-baseline="central" fill="#791F1F">lost</text>

  <rect x="55" y="324" width="142" height="24" rx="4" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="126" y="336" text-anchor="middle" dominant-baseline="central" fill="#633806">timer fires — resend</text>

  <line x1="113" y1="362" x2="567" y2="362" stroke="#185FA5" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arrow)"/>
  <text x="340" y="356" text-anchor="middle" fill="#185FA5">Request (resend)</text>
  <line x1="567" y1="382" x2="113" y2="382" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="340" y="376" text-anchor="middle" fill="#0F6E56">Reply(AMOResult)</text>

  <!-- ── CASE 3: Duplicate ── -->
  <rect x="40" y="408" width="600" height="28" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="340" y="422" text-anchor="middle" dominant-baseline="central" font-weight="500" font-size="13" fill="#712B13">3 · Duplicate-request case</text>

  <rect x="55" y="448" width="110" height="36" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="110" y="466" text-anchor="middle" dominant-baseline="central" font-weight="500" font-size="13" fill="#0C447C">Client</text>
  <rect x="515" y="448" width="110" height="36" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="570" y="466" text-anchor="middle" dominant-baseline="central" font-weight="500" font-size="13" fill="#3C3489">Server</text>

  <line x1="110" y1="484" x2="110" y2="636" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="570" y1="484" x2="570" y2="636" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="4 3"/>

  <line x1="113" y1="506" x2="567" y2="506" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="340" y="500" text-anchor="middle" fill="#185FA5">Request (seq=N)</text>
  <line x1="567" y1="530" x2="365" y2="530" stroke="#0F6E56" stroke-width="1.5"/>
  <text x="466" y="524" text-anchor="middle" fill="#0F6E56">Reply</text>
  <line x1="358" y1="523" x2="374" y2="539" stroke="#A32D2D" stroke-width="2" stroke-linecap="round"/>
  <line x1="374" y1="523" x2="358" y2="539" stroke="#A32D2D" stroke-width="2" stroke-linecap="round"/>
  <rect x="318" y="521" width="38" height="22" rx="4" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="337" y="532" text-anchor="middle" dominant-baseline="central" fill="#791F1F">lost</text>

  <rect x="55" y="554" width="142" height="24" rx="4" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="126" y="566" text-anchor="middle" dominant-baseline="central" fill="#633806">timer fires — resend</text>

  <line x1="113" y1="590" x2="567" y2="590" stroke="#185FA5" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arrow)"/>
  <text x="340" y="584" text-anchor="middle" fill="#185FA5">Request (seq=N, duplicate)</text>

  <rect x="426" y="599" width="158" height="24" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="505" y="611" text-anchor="middle" dominant-baseline="central" fill="#444441">cache hit — no re-exec</text>

  <line x1="567" y1="626" x2="113" y2="626" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="340" y="620" text-anchor="middle" fill="#0F6E56">Reply (cached, seq=N)</text>

  <!-- ── CASE 4: Delayed reply ── -->
  <rect x="40" y="652" width="600" height="28" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="666" text-anchor="middle" dominant-baseline="central" font-weight="500" font-size="13" fill="#2C2C2A">4 · Delayed-reply case</text>

  <rect x="55" y="692" width="110" height="36" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="110" y="710" text-anchor="middle" dominant-baseline="central" font-weight="500" font-size="13" fill="#0C447C">Client</text>
  <rect x="515" y="692" width="110" height="36" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="570" y="710" text-anchor="middle" dominant-baseline="central" font-weight="500" font-size="13" fill="#3C3489">Server</text>

  <line x1="110" y1="728" x2="110" y2="860" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="570" y1="728" x2="570" y2="860" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="4 3"/>

  <line x1="113" y1="752" x2="567" y2="752" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="340" y="746" text-anchor="middle" fill="#185FA5">Request (seq=N)</text>
  <line x1="113" y1="786" x2="567" y2="786" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="340" y="780" text-anchor="middle" fill="#185FA5">Request (seq=N+1) — client moved on</text>

  <line x1="567" y1="820" x2="113" y2="820" stroke="#888780" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arrow)"/>
  <text x="340" y="814" text-anchor="middle" fill="#888780">Reply (seq=N) — stale / delayed</text>

  <rect x="55" y="830" width="176" height="24" rx="4" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="143" y="842" text-anchor="middle" dominant-baseline="central" fill="#791F1F">ignored — seq mismatch</text>
